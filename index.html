<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Heide Park Resort Roblox Booking</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script defer src="settings.js"></script>
<script defer src="calendar.js"></script>
<script defer src="booking.js"></script>

</head>

<body>



<!-- LOGIN SCREEN -->

<div id="loginScreen">

<div class="loginBox">

<h2>

<i class="fa-solid fa-ticket"></i>

Heide Park Roblox Booking

</h2>

<p class="loginSubtitle">

Login or create an account to continue

</p>


<input id="loginUsername" placeholder="Username">

<input id="loginPassword" type="password" placeholder="Password">

<div class="loginButtons">

<button id="loginBtnMain">

<i class="fa-solid fa-right-to-bracket"></i>

Login

</button>

<button id="registerBtn">

<i class="fa-solid fa-user-plus"></i>

Register

</button>

</div>

</div>

</div>



<!-- MAIN WEBSITE -->

<div id="siteWrapper">



<header class="topbar">

<div class="logo">

<i class="fa-solid fa-ticket"></i>

<span>Heide Park Resort Roblox</span>

</div>


<div class="accountArea">

<span id="accountName"></span>

<button id="logoutBtn">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</button>

</div>

</header>



<section class="hero">

<h1>

<i class="fa-solid fa-calendar-days"></i>

Book your visit

</h1>

<p>

Reserve your park experience day

</p>

</section>



<section class="calendarSection">


<div class="calendarHeader">

<button id="prevMonth">

<i class="fa-solid fa-chevron-left"></i>

</button>

<h2 id="monthTitle"></h2>

<button id="nextMonth">

<i class="fa-solid fa-chevron-right"></i>

</button>

</div>



<div class="calendarLegend">

<div>

<span class="legend available"></span>

Available

</div>

<div>

<span class="legend pending"></span>

Pending

</div>

<div>

<span class="legend full"></span>

Full

</div>

<div>

<span class="legend disabled"></span>

Unavailable

</div>

</div>



<canvas id="calendarCanvas"></canvas>


</section>



<!-- BOOKING POPUP -->

<div id="bookingPopup">

<div class="bookingBox">

<h3>

<i class="fa-solid fa-calendar-check"></i>

Book this day

</h3>


<label>

<i class="fa-solid fa-hashtag"></i>

Contact Username

</label>

<input id="contactName">


<label>

<i class="fa-brands fa-discord"></i>

Contact Platform

</label>

<select id="contactPlatform">

<option value="Discord">Discord</option>
<option value="TikTok">TikTok</option>

</select>


<div class="termsBox">

<input type="checkbox" id="termsCheck">

<span>

No refunds accepted

</span>

</div>


<button id="confirmBooking">

<i class="fa-solid fa-check"></i>

Confirm Booking

</button>


<button id="cancelBooking">

<i class="fa-solid fa-xmark"></i>

Cancel

</button>


</div>

</div>



</div>


</body>
</html>
